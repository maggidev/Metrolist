name: Quick Plugin Build (Unsigned)

on:
  workflow_dispatch:
  push:
    branches: ["**"]
    paths-ignore:
      - "README.md"
      - "assets/**"
      - ".github/**/*.md"

permissions:
  contents: write

jobs:
  build_plugin:
    name: Build Unsigned Plugin APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v5

      # Este passo é necessário se a source usar buffers de protocolo (comum em players)
      - name: Setup and Generate Protobuf
        run: |
          if [ -d "./.github/actions/setup-protobuf" ]; then
            uses: ./.github/actions/setup-protobuf
          else
            echo "Protobuf action not found, skipping..."
          fi
        continue-on-error: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Prepare Plugin Manifest & Package
        run: |
          # 1. Altera o Application ID para não conflitar com o original
          sed -i 's/applicationId = "com.metrolist.music"/applicationId = "com.metrolist.music.plugin"/' app/build.gradle.kts
          
          # 2. Desativa o R8 (Minify) para o código não ficar bagunçado/ofuscado
          # Isso garante que você consiga chamar as classes do plugin pelo seu app
          sed -i 's/isMinifyEnabled = true/isMinifyEnabled = false/' app/build.gradle.kts
          
          # 3. Torna a Activity invisível (Remove o Launcher do Manifest)
          # Procura a linha do LAUNCHER e a remove
          sed -i '/android.intent.category.LAUNCHER/d' app/src/main/AndroidManifest.xml

      - name: Build Release APK
        run: ./gradlew assembleFossRelease -x lint -x test --stacktrace
        env:
          # Mantemos as chaves vazias para o Gradle não dar erro de variável nula
          LASTFM_API_KEY: "dummy_key"
          LASTFM_SECRET: "dummy_secret"

      - name: Organize Artifacts
        run: |
          mkdir -p out/
          # Procura o APK gerado (geralmente em app/build/outputs/apk/foss/release/)
          find app/build/outputs/apk/ -name "*.apk" -exec mv {} out/plugin-unsigned.apk \;

      - name: Upload Plugin APK
        uses: actions/upload-artifact@v4
        with:
          name: music-plugin-test
          path: out/plugin-unsigned.apk
